<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Changelog Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #fafafa; min-height: 100vh;
         display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .card { background: white; border: 1px solid #e5e5e5; border-radius: 12px;
          padding: 2.5rem; max-width: 520px; width: 100%; }
  h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.4rem; }
  .sub { color: #666; font-size: 0.9rem; margin-bottom: 2rem; }
  label { display: block; font-size: 0.85rem; font-weight: 500;
          margin-bottom: 0.4rem; color: #444; }
  input { width: 100%; padding: 0.65rem 0.85rem; border: 1px solid #ddd;
          border-radius: 8px; font-size: 0.95rem; margin-bottom: 1rem; outline: none; }
  input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  button { width: 100%; padding: 0.75rem; background: #6366f1; color: white;
           border: none; border-radius: 8px; font-size: 1rem;
           font-weight: 500; cursor: pointer; }
  button:hover { background: #4f46e5; }
  .error { background: #fef2f2; border: 1px solid #fca5a5; border-radius: 8px;
           padding: 0.75rem 1rem; color: #dc2626; font-size: 0.9rem; margin-bottom: 1rem; }
</style>
</head>
<body>
<div class="card">
  <h1>Changelog Generator</h1>
  <p class="sub">Turn messy git commits into clean, readable release notes.</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST" action="/generate">
    <label>GitHub Repository URL</label>
    <input type="text" name="repo_url" placeholder="https://github.com/owner/repo" required>
    <div class="row">
      <div>
        <label>From date</label>
        <input type="date" name="since_date" required>
      </div>
      <div>
        <label>To date</label>
        <input type="date" name="until_date" required>
      </div>
    </div>
    <button type="submit">Generate changelog →</button>
  </form>
</div>
</body>
</html>
